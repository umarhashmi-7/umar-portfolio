<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="spark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Stylized "U" for Umar and Tech/AI vibes -->
  <path d="M160,160 L160,280 C160,332.8 202.9,376 256,376 C309.1,376 352,332.8 352,280 L352,160" 
        fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Sparkle/AI Symbol (Glow effect) -->
  <path d="M256,120 L266,144 L290,154 L266,164 L256,188 L246,164 L222,154 L246,144 Z" 
        fill="url(#spark-grad)" filter="url(#glow)" />
  <path d="M370,260 L375,272 L387,277 L375,282 L370,294 L365,282 L353,277 L365,272 Z" 
        fill="url(#spark-grad)" filter="url(#glow)" />
</svg>
