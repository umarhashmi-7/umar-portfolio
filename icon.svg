<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    
    <!-- Outer Glow Gradient -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Inner Metallic U Gradient -->
    <linearGradient id="metallic-u" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#93c5fd" />
      <stop offset="70%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Sparkle Glow Filter -->
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base with subtle border -->
  <rect width="510" height="510" x="1" y="1" rx="140" fill="url(#bg-grad)" stroke="url(#glow-grad)" stroke-width="6" />

  <!-- Outer ambient glow circle inside the square -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow-grad)" stroke-width="2" stroke-dasharray="10, 15" opacity="0.3" />

  <!-- Glowing background behind U -->
  <path d="M160,165 L160,280 C160,332.8 202.9,376 256,376 C309.1,376 352,332.8 352,280 L352,165" 
        fill="none" stroke="url(#glow-grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" opacity="0.25" filter="url(#glow-filter)" />

  <!-- Stylized concentric inner U path (Metallic & Tech) -->
  <path d="M160,165 L160,280 C160,332.8 202.9,376 256,376 C309.1,376 352,332.8 352,280 L352,165" 
        fill="none" stroke="url(#metallic-u)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Inner tech-track line inside U -->
  <path d="M185,165 L185,280 C185,319 217,351 256,351 C295,351 327,319 327,280 L327,165" 
        fill="none" stroke="#0b0f19" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />

  <!-- AI Sparkle / Star (Top-Center) -->
  <path d="M256,105 L267,130 L292,141 L267,152 L256,177 L245,152 L220,141 L245,130 Z" 
        fill="#ffffff" filter="url(#glow-filter)" />
  <circle cx="256" cy="141" r="3" fill="#60a5fa" />

  <!-- Floating particles/nodes -->
  <circle cx="120" cy="220" r="8" fill="#3b82f6" filter="url(#glow-filter)" />
  <circle cx="392" cy="220" r="8" fill="#7c3aed" filter="url(#glow-filter)" />
  <line x1="120" y1="220" x2="160" y2="220" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4, 4" opacity="0.6" />
  <line x1="392" y1="220" x2="352" y2="220" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4, 4" opacity="0.6" />

  <circle cx="370" cy="320" r="5" fill="#10b981" filter="url(#glow-filter)" />
</svg>
